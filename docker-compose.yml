version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: fmciii_postgres
    environment:
      POSTGRES_USER: fmciii
      POSTGRES_PASSWORD: fmciii_secret
      POSTGRES_DB: fmciii_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U fmciii -d fmciii_db']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fmciii_backend
    environment:
      DATABASE_URL: postgresql://fmciii:fmciii_secret@postgres:5432/fmciii_db
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      JWT_EXPIRES_IN: 7d
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-http://localhost:3000/auth/callback}
      GOOGLE_DRIVE_FOLDER: ${GOOGLE_DRIVE_FOLDER:-}
      PORT: 5000
      NODE_ENV: production
      FRONTEND_URL: http://localhost:3000
    ports:
      - '5000:5000'
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: fmciii_frontend
    ports:
      - '3000:80'
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
